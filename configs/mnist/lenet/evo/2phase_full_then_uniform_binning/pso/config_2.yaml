script: src/evo/evo_2phase_trainer.py
arch: lenet
dataset: mnist
num_fe: 2500000
batch_size: 256
criterion: ce
adapter: global_uniform_binning_directly
optimizer: pso
pso_w: 0.5
pso_c1: 2.0
pso_c2: 2.0
pso_initial_velocity: random
pso_max_velocity_rate: 0.20
seed: 42
alpha: 1.0
phase1_pop_init: uniform
phase1_pop_init_lb: -0.1
phase1_pop_init_ub: 0.1
phase2_pop_init: best+uniform_on_best_lb_ub
phase1_pop_size: 50
phase2_pop_size: 200
phase1_num_iterations: 1000
phase2_num_iterations: 12500
l2_reg_wd: 1e-3
adapter_k: 1024
test_interval: 10
save_path: logs/mnist/lenet/evo/2phase_full_then_uniform_binning/pso/1000_12500/seed_42
wandb_entity: rasa_research
wandb_project: evonn
wandb_group: 2phase[1000,12.5K]-best+uniform_on_best_lb_ub-pso
wandb_name: 2phase[1000,12.5K]-best+uniform_on_best_lb_ub-pso-seed_42
disable_wandb: false
note: LeNet on MNIST with 2-phase training (full then uniform binning) with PSO optimizer for phase 2
